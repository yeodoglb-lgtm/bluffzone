name: Supabase Keep Alive

# Supabase 무료 티어가 일정 시간 미사용 시 PgBouncer 커넥션 / 엣지 캐시가 cold 상태로
# 떨어지면서 사용자의 첫 요청이 30초~1분 멈추는 문제 회피.
# 5분마다 가벼운 SELECT 한 번 보내서 항상 warm 유지.
#
# GitHub Actions free tier로 무제한 실행 (public 저장소) / 월 2000분 (private).
# 1회 실행에 ~5초 → private이라도 충분.

on:
  schedule:
    # 매 5분마다 (UTC 기준이지만 cron 간격이라 무관)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # GitHub UI에서 수동 실행 가능

# 동시 실행 방지 (이전 작업 끝나기 전 새로 시작 안 함)
concurrency:
  group: supabase-keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase REST
        run: |
          # profiles 테이블에 id 1개만 가져오는 가장 가벼운 쿼리
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://chxcayaehgwqrpjuajqx.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoeGNheWFlaGd3cXJwanVhanF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTE1MTcsImV4cCI6MjA5MjQ4NzUxN30.Ab8eydesy_uCmVvdQ31wyOx_ZW9mBr2UGRxnwKVqrxk")
          echo "Supabase REST ping → HTTP $STATUS"
          # 200/206 = 정상, 그 외엔 워크플로 실패로 알림
          [ "$STATUS" = "200" ] || [ "$STATUS" = "206" ]

      - name: Ping Supabase Auth
        run: |
          # Auth 엔드포인트도 별도 ping (auth 모듈도 cold 가능)
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://chxcayaehgwqrpjuajqx.supabase.co/auth/v1/health" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNoeGNheWFlaGd3cXJwanVhanF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTE1MTcsImV4cCI6MjA5MjQ4NzUxN30.Ab8eydesy_uCmVvdQ31wyOx_ZW9mBr2UGRxnwKVqrxk")
          echo "Supabase Auth ping → HTTP $STATUS"
          # 401도 OK (인증 필요한 엔드포인트라 정상 응답)
          [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]

      - name: Ping Edge Function (claude-proxy)
        run: |
          # Edge Function도 cold start 있음. OPTIONS preflight로 가볍게 깨움.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X OPTIONS \
            "https://chxcayaehgwqrpjuajqx.supabase.co/functions/v1/claude-proxy" \
            -H "Origin: https://bluffzone.kr" \
            -H "Access-Control-Request-Method: POST")
          echo "Edge Function ping → HTTP $STATUS"
          # 200/204 = OPTIONS preflight 정상
          [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ]
